<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pyground — learn Python in your browser</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />

<style>
  :root{
    --bg:#EFEBE0; --paper:#FBF9F3; --ink:#16181D; --ink-2:#23262E;
    --muted:#6A6E78; --line:#DED8C8; --honey:#FFB000; --honey-press:#E59E00;
    --pine:#1F9B7A; --pine-soft:#E7F4EF; --code-fg:#EAE6DA;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:"Space Grotesk", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    -webkit-font-smoothing:antialiased;}

  /* header */
  header{display:flex; align-items:center; justify-content:space-between;
    padding:13px 22px; border-bottom:1px solid var(--line); background:var(--bg);
    position:sticky; top:0; z-index:30;}
  .brand{display:flex; align-items:center; gap:10px;}
  .glyph{font-family:"JetBrains Mono",monospace; font-weight:700; background:var(--ink);
    color:var(--honey); padding:4px 9px; border-radius:9px; font-size:15px; letter-spacing:-1px;}
  .brand b{font-weight:700; font-size:18px; letter-spacing:-.3px;}
  .brand .tag{font-size:11px; font-weight:600; color:var(--muted);
    border:1px solid var(--line); padding:2px 8px; border-radius:999px;}
  .head-right{display:flex; align-items:center; gap:12px;}
  .overall{font-size:13px; color:var(--muted); font-weight:600;}
  .reset{font-family:"Space Grotesk",sans-serif; font-size:12px; font-weight:500; color:var(--muted);
    background:transparent; border:1px solid var(--line); border-radius:8px; padding:4px 10px; cursor:pointer;}
  .reset:hover{color:var(--ink); border-color:var(--muted);}
  .rail-toggle{display:none; font-family:"Space Grotesk",sans-serif; font-size:13px; font-weight:600;
    background:var(--ink); color:#fff; border:0; border-radius:9px; padding:6px 12px; cursor:pointer;}

  /* layout */
  .layout{display:grid; grid-template-columns:248px minmax(0,1fr);}
  .rail{border-right:1px solid var(--line); padding:18px 14px; height:calc(100vh - 56px);
    overflow:auto; position:sticky; top:56px;}
  .rail-module{font-family:"JetBrains Mono",monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:1px; color:var(--muted); margin:16px 8px 7px;}
  .rail-module:first-child{margin-top:0;}
  .rail-item{display:flex; align-items:center; gap:9px; width:100%; text-align:left;
    background:transparent; border:0; border-radius:9px; padding:8px 9px; cursor:pointer;
    font-family:"Space Grotesk",sans-serif; font-size:13.5px; color:#3A3D45; line-height:1.3;}
  .rail-item:hover{background:#E7E2D5;}
  .rail-item.active{background:#FFF3D6; color:var(--ink); font-weight:600;
    box-shadow:inset 3px 0 0 var(--honey);}
  .rail-item .check{flex:none; width:17px; height:17px; border-radius:50%; border:1.5px solid #C9C2B0;
    display:flex; align-items:center; justify-content:center;}
  .rail-item .check svg{width:11px; height:11px; opacity:0; color:#fff;}
  .rail-item.done .check{background:var(--pine); border-color:var(--pine);}
  .rail-item.done .check svg{opacity:1;}

  .content{padding:22px; min-width:0;}
  main{display:grid; grid-template-columns:minmax(0,0.95fr) minmax(0,1.05fr); gap:20px;
    max-width:1150px; align-items:start;}

  /* lesson card */
  .lesson{background:var(--paper); border:1px solid var(--line); border-radius:18px; padding:24px 24px 22px;}
  .eyebrow{font-family:"JetBrains Mono",monospace; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:12px;}
  .eyebrow .prompt{color:var(--honey-press);}
  .lesson h1{font-size:25px; font-weight:700; letter-spacing:-.5px; margin:0 0 14px;}
  .lesson .concept p{font-size:15px; line-height:1.6; color:#33363D; margin:0 0 12px;}
  .lesson code{font-family:"JetBrains Mono",monospace; font-size:12.5px; background:#ECE6D6;
    padding:1px 6px; border-radius:6px;}
  .turn{margin-top:18px; padding:15px 17px; background:#FFF; border:1px solid var(--line);
    border-left:3px solid var(--honey); border-radius:12px;}
  .turn .label{font-family:"JetBrains Mono",monospace; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:1px; color:var(--honey-press); display:block; margin-bottom:8px;}
  .turn p{margin:0 0 8px; font-size:14px; color:#33363D; line-height:1.55;}
  .turn pre{margin:8px 0 0; font-family:"JetBrains Mono",monospace; font-size:13px;
    background:#16181D; color:#EAE6DA; padding:10px 12px; border-radius:8px; white-space:pre-wrap;}
  .turn code{background:#ECE6D6;}

  .lesson-nav{display:flex; justify-content:space-between; gap:10px; margin-top:18px;}
  .nav-btn{font-family:"Space Grotesk",sans-serif; font-size:13px; font-weight:600; color:#3A3D45;
    background:#FFF; border:1px solid var(--line); border-radius:9px; padding:7px 13px; cursor:pointer;}
  .nav-btn:hover:not(:disabled){border-color:var(--muted);}
  .nav-btn:disabled{opacity:.4; cursor:default;}

  /* workspace */
  .workspace{display:flex; flex-direction:column; gap:16px;}
  .editor-shell,.output-shell{background:var(--ink); border-radius:16px; overflow:hidden;
    box-shadow:0 12px 30px -18px rgba(0,0,0,.5);}
  .bar{display:flex; align-items:center; gap:10px; height:46px; padding:0 14px;
    background:var(--ink-2); border-bottom:1px solid #000;}
  .filename{font-family:"JetBrains Mono",monospace; font-size:12px; color:#A7ABB5; display:flex; align-items:center; gap:8px;}
  .filename .dot{width:8px; height:8px; border-radius:50%; background:var(--pine);}
  .saved{font-family:"JetBrains Mono",monospace; font-size:11px; color:#6FCF97; opacity:0; transition:opacity .25s ease;}
  .saved.show{opacity:1;}
  .spacer{flex:1;}
  .btns{display:flex; gap:8px;}
  .btn{display:inline-flex; align-items:center; gap:7px; font-family:"Space Grotesk",sans-serif;
    font-weight:600; font-size:13px; border-radius:9px; padding:7px 15px; cursor:pointer;
    transition:transform .08s ease, background .15s ease, border-color .15s ease;}
  .btn:active{transform:scale(.96);}
  .btn:disabled{opacity:.55; cursor:default;}
  .btn:focus-visible{outline:3px solid #fff; outline-offset:2px;}
  .btn svg{width:13px; height:13px;}
  .btn-run{background:transparent; color:#CFD2D9; border:1px solid #3A3E48;}
  .btn-run:hover{border-color:#5A5F6B; color:#fff;}
  .btn-check{background:var(--honey); color:var(--ink); border:1px solid var(--honey);}
  .btn-check:hover{background:var(--honey-press); border-color:var(--honey-press);}

  .CodeMirror{height:280px; font-family:"JetBrains Mono",monospace !important; font-size:13.5px;
    line-height:1.6; background:var(--ink) !important;}
  .CodeMirror-gutters{background:var(--ink) !important; border:0 !important;}

  .out-head{display:flex; align-items:center; gap:8px; font-family:"JetBrains Mono",monospace; font-size:12px; color:#A7ABB5;}
  .out-head .prompt{color:var(--honey);}
  pre.output{margin:0; padding:16px 16px 20px; font-family:"JetBrains Mono",monospace; font-size:13px;
    line-height:1.65; color:var(--code-fg); white-space:pre-wrap; word-break:break-word;
    min-height:64px; max-height:240px; overflow:auto;}
  pre.output .err{color:#FF8B6B;}
  pre.output .dim{color:#7E828C;}

  .result{border-radius:16px; padding:18px 20px; border:1px solid var(--line); background:var(--paper);}
  .result[hidden]{display:none;}
  .result .head{display:flex; align-items:center; gap:9px; font-weight:700; font-size:16px; letter-spacing:-.3px; margin-bottom:6px;}
  .result .badge{font-family:"JetBrains Mono",monospace; font-size:12px; font-weight:700; padding:3px 9px; border-radius:7px;}
  .result p{margin:0 0 8px; font-size:14px; color:#33363D; line-height:1.55;}
  .result .cmp{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px;}
  .result .cmp .box{background:var(--ink); border-radius:10px; padding:10px 12px;}
  .result .cmp .box .lbl{font-family:"JetBrains Mono",monospace; font-size:10px; text-transform:uppercase;
    letter-spacing:1px; color:#7E828C; display:block; margin-bottom:5px;}
  .result .cmp pre{margin:0; font-family:"JetBrains Mono",monospace; font-size:12.5px; color:#EAE6DA;
    white-space:pre-wrap; word-break:break-word;}
  .result.correct{background:var(--pine-soft); border-color:#BFE3D6;}
  .result.correct .badge{background:var(--pine); color:#fff;}
  .result.correct .head{color:#136A52;}
  .result.notyet .badge{background:var(--honey); color:var(--ink);}
  .result.notyet .head{color:#8A6200;}
  .result.error .badge{background:#FF8B6B; color:#3a1409;}
  .result.error .head{color:#a23d1f;}
  .result .next{margin-top:12px;}
  .result .errline{margin:10px 0 0; font-family:"JetBrains Mono",monospace; font-size:12.5px;
    background:var(--ink); color:#FFB37A; padding:10px 12px; border-radius:10px; white-space:pre-wrap; word-break:break-word;}
  .CodeMirror .cm-error{color:#FFB37A !important; background:rgba(255,139,107,.10); border-radius:3px;}

  .hints{margin-top:16px; border-top:1px solid rgba(0,0,0,.09); padding-top:14px;}
  .hints .stuck{font-family:"JetBrains Mono",monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:1px; color:var(--muted); display:block; margin-bottom:10px;}
  .hint{background:#FFF; border:1px solid var(--line); border-left:3px solid var(--honey); border-radius:10px;
    padding:10px 13px; margin-bottom:8px; font-size:13.5px; color:#33363D; line-height:1.5;}
  .hint b{font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--honey-press); display:block; margin-bottom:3px; letter-spacing:.5px;}
  .pill-btn{font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:13px; background:#FFF;
    color:var(--honey-press); border:1px solid var(--honey); border-radius:9px; padding:7px 14px; cursor:pointer;}
  .pill-btn:hover{background:#FFF7E6;}
  .pill-btn:active{transform:scale(.97);}
  .hints .done{font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--muted);}

  .fade{animation:fade .18s ease;}
  @keyframes fade{from{opacity:.3;} to{opacity:1;}}

  @media (max-width:1100px){ main{grid-template-columns:1fr;} }
  @media (max-width:880px){
    .layout{grid-template-columns:1fr;}
    .rail-toggle{display:inline-flex;}
    .rail{position:fixed; top:0; left:0; bottom:0; width:270px; height:100vh; background:var(--bg);
      z-index:50; transform:translateX(-100%); transition:transform .2s ease; box-shadow:8px 0 30px -10px rgba(0,0,0,.3);}
    body.rail-open .rail{transform:none;}
    .content{padding:16px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important;}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="glyph">&gt;&gt;&gt;</span>
    <b>Pyground</b>
    <span class="tag">working name</span>
  </div>
  <div class="head-right">
    <button class="rail-toggle" id="railToggle">☰ Lessons</button>
    <span class="overall" id="overall">0 / 0 done</span>
    <button class="reset" id="resetBtn">Reset</button>
  </div>
</header>

<div class="layout">
  <aside class="rail" id="rail"></aside>

  <div class="content">
    <main>
      <section class="lesson">
        <div class="eyebrow"><span class="prompt">&gt;&gt;&gt;</span> module · <span id="lessonModule"></span></div>
        <h1 id="lessonTitle"></h1>
        <div class="concept" id="lessonConcept"></div>
        <div class="turn">
          <span class="label">Your turn</span>
          <div id="lessonTask"></div>
        </div>
        <div class="lesson-nav">
          <button class="nav-btn" id="prevBtn">← Previous</button>
          <button class="nav-btn" id="nextBtn">Next →</button>
        </div>
      </section>

      <section class="workspace">
        <div class="editor-shell">
          <div class="bar">
            <span class="filename"><span class="dot"></span> main.py</span>
            <span class="saved" id="savedTag">saved</span>
            <span class="spacer"></span>
            <div class="btns">
              <button class="btn btn-run" id="runBtn">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
                <span id="runLabel">Run</span>
              </button>
              <button class="btn btn-check" id="checkBtn">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.4z"/></svg>
                <span id="checkLabel">Check answer</span>
              </button>
            </div>
          </div>
          <textarea id="code"></textarea>
        </div>

        <div class="output-shell">
          <div class="bar"><span class="out-head"><span class="prompt">&gt;&gt;&gt;</span> output</span></div>
          <pre class="output" id="output"><span class="dim">Press Run to test your code, or Check answer to grade it.</span></pre>
        </div>

        <div class="result" id="result" hidden></div>
      </section>
    </main>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
<script src="lessons.js"></script>

<script>
  const LESSONS = window.LESSONS || [];

  // ----- storage -----
  const STORE_KEY = "pyground:v1";
  function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; } }
  function saveStore(d){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(d)); }catch(e){} }
  function getLesson(id){ const s = loadStore(); return (s.lessons && s.lessons[id]) || {}; }
  function setLesson(id, patch){
    const s = loadStore(); s.lessons = s.lessons || {};
    s.lessons[id] = Object.assign({}, s.lessons[id], patch); saveStore(s);
  }

  // ----- elements -----
  const out = document.getElementById("output");
  const resultEl = document.getElementById("result");
  const runBtn = document.getElementById("runBtn");
  const checkBtn = document.getElementById("checkBtn");
  const runLabel = document.getElementById("runLabel");
  const checkLabel = document.getElementById("checkLabel");
  const savedTag = document.getElementById("savedTag");
  const overallEl = document.getElementById("overall");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
    mode:"python", theme:"material-darker", lineNumbers:true, indentUnit:4, tabSize:4
  });

  let currentIndex = 0, current = null, hintsRevealed = 0, loading = false;

  function escapeHtml(s){ return String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }
  function showOutput(html){ out.className = "output fade"; out.innerHTML = html; void out.offsetWidth; }
  function setBusy(b, who){
    runBtn.disabled = b; checkBtn.disabled = b;
    runLabel.textContent = (b && who==="run") ? "Running…" : "Run";
    checkLabel.textContent = (b && who==="check") ? "Checking…" : "Check answer";
  }
  function normalize(s){
    return String(s).replace(/\r\n/g,"\n").split("\n").map(l => l.replace(/\s+$/,"")).join("\n")
      .replace(/\n+$/,"").replace(/^\n+/,"");
  }
  // turn a raw Python error into a plain-language explanation
  function friendlyError(raw){
    const text = String(raw || "");
    const lines = text.split("\n").map(s => s.trim()).filter(Boolean);
    let headline = "";
    for(let i=lines.length-1;i>=0;i--){ if(/Error|Exception/.test(lines[i])){ headline = lines[i]; break; } }
    if(!headline){ headline = lines.length ? lines[lines.length-1] : "Something went wrong."; }

    let explain = "Your code hit an error. The exact message is shown below.";
    if(/endless loop|ran too long/i.test(text))
      explain = "Your loop didn't stop. A while-loop repeats until its condition becomes False — make sure something inside the loop changes that condition, like increasing or decreasing a counter each time.";
    else if(/expected an indented block/.test(text))
      explain = "Python expected indented code here. After a line that ends with a colon ( : ) — an if, for, while, or def — the next line must be pushed in by 4 spaces.";
    else if(/unexpected indent/.test(text))
      explain = "There's an unexpected indent. A line is pushed in further than Python expects. Only the lines inside an if, for, while, or function get indented (4 spaces); everything else lines up at the far left.";
    else if(/expected ':'/.test(text))
      explain = "A colon is missing. Lines that begin a block — if, elif, else, for, while, def — must end with a colon ( : ).";
    else if(/unterminated string/.test(text))
      explain = "A quote is missing. Every opening quote needs a matching closing quote on the same line.";
    else if(/was never closed/.test(text))
      explain = "A bracket was opened but never closed. Check that every ( has a matching ).";
    else if(/is not defined/.test(text)){
      const m = text.match(/name '([^']+)' is not defined/);
      explain = "Python doesn't recognise " + (m ? "the name '" + m[1] + "'" : "a name") + ". Check the spelling, make sure you created it with = before using it, and remember text needs quotes around it.";
    }
    else if(/KeyError/.test(text)){
      const m = text.match(/KeyError: ['"]?([^'"\n]+)['"]?/);
      explain = "Python couldn't find " + (m ? "the column '" + m[1].trim() + "'" : "that column") + " in the data. Column names must match exactly — check the spelling and capitals against the columns you printed earlier.";
    }
    else if(/FileNotFoundError|No such file/.test(text))
      explain = "The data file couldn't be found. Check the filename in your read_csv() — it must match exactly, including the .csv ending.";
    else if(/TypeError/.test(text))
      explain = "A type mismatch — usually mixing text and numbers. Convert with str() or int() so both sides are the same type.";
    else if(/IndentationError/.test(text))
      explain = "An indentation problem — the spacing at the start of a line isn't what Python expects. Indent 4 spaces inside a block; line everything else up at the left.";
    else if(/SyntaxError/.test(text))
      explain = "A syntax error — a typo in the code's structure. Check the brackets, quotes, and colons on the highlighted line.";

    return { headline: headline, explain: explain };
  }
  let savedTimer;
  function flashSaved(){ savedTag.classList.add("show"); clearTimeout(savedTimer);
    savedTimer = setTimeout(()=> savedTag.classList.remove("show"), 1100); }

  // ----- sidebar -----
  function buildSidebar(){
    const rail = document.getElementById("rail");
    let html = "", lastModule = null;
    LESSONS.forEach((l, i) => {
      if(l.module !== lastModule){ html += '<div class="rail-module">'+escapeHtml(l.module)+'</div>'; lastModule = l.module; }
      html += '<button class="rail-item" id="nav-'+l.id+'" data-i="'+i+'">'
            +   '<span class="check"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2l-3.5-3.5L4 14.2l5 5 11-11-1.5-1.4z"/></svg></span>'
            +   '<span class="t">'+escapeHtml(l.title)+'</span>'
            + '</button>';
    });
    rail.innerHTML = html;
    rail.querySelectorAll(".rail-item").forEach(btn => {
      btn.addEventListener("click", () => loadLesson(parseInt(btn.dataset.i,10)));
    });
  }
  function markNavDone(id){ const n = document.getElementById("nav-"+id); if(n) n.classList.add("done"); }
  function updateActiveNav(){
    document.querySelectorAll(".rail-item").forEach(n => n.classList.remove("active"));
    const n = document.getElementById("nav-"+current.id); if(n) n.classList.add("active");
  }
  function updateOverall(){
    let done = 0; LESSONS.forEach(l => { if(getLesson(l.id).completed) done++; });
    overallEl.textContent = done + " / " + LESSONS.length + " done";
  }

  // ----- load a lesson -----
  function loadLesson(i){
    if(i < 0 || i >= LESSONS.length) return;
    if(current){ setLesson(current.id, { code: editor.getValue() }); } // flush outgoing
    currentIndex = i; current = LESSONS[i]; hintsRevealed = 0; resultEl.hidden = true;

    document.getElementById("lessonModule").textContent = current.module;
    document.getElementById("lessonTitle").textContent = current.title;
    document.getElementById("lessonConcept").innerHTML = current.concept;
    document.getElementById("lessonTask").innerHTML = current.task;

    const saved = getLesson(current.id);
    loading = true;
    editor.setValue(typeof saved.code === "string" && saved.code.length ? saved.code : current.starter);
    loading = false;

    showOutput('<span class="dim">Press Run to test your code, or Check answer to grade it.</span>');
    updateActiveNav();
    prevBtn.disabled = (i === 0);
    nextBtn.disabled = (i === LESSONS.length - 1);

    const s = loadStore(); s.lastLesson = current.id; saveStore(s);
    document.body.classList.remove("rail-open");
  }

  // ----- save code as typed -----
  let codeTimer;
  editor.on("change", function(){
    if(loading || !current) return;
    clearTimeout(codeTimer);
    codeTimer = setTimeout(function(){ setLesson(current.id, { code: editor.getValue() }); flashSaved(); }, 400);
  });

  // ----- python -----
  let pyodidePromise = null;
  async function getPython(){
    if(!pyodidePromise){
      showOutput('<span class="dim">Starting Python… first time takes a few seconds.</span>');
      pyodidePromise = loadPyodide({ indexURL:"https://cdn.jsdelivr.net/pyodide/v0.26.1/full/" });
    }
    return pyodidePromise;
  }
  const PY_STDOUT =
    "import sys, io, warnings\n" +
    "warnings.simplefilter('ignore')\n" +
    "sys.stdout = io.StringIO()\n" +
    "sys.stderr = io.StringIO()\n";
  const PY_GUARD =
    "_pg_n = 0\n" +
    "def _pg_guard(f, e, a):\n" +
    "    global _pg_n\n" +
    "    _pg_n += 1\n" +
    "    if _pg_n > 1500000:\n" +
    "        raise RuntimeError(\"This looks like an endless loop. It ran too long \\u2014 make sure the loop's condition eventually becomes False, for example by changing a counter inside the loop.\")\n" +
    "    return _pg_guard\n" +
    "sys.settrace(_pg_guard)\n";

  // pandas + dataset support (Phase 3)
  let pandasLoaded = false;
  const datasetCache = {};
  async function ensureDataset(py, name){
    if(!(name in datasetCache)){
      const resp = await fetch(name);
      if(!resp.ok){ throw new Error("dataset fetch failed"); }
      datasetCache[name] = await resp.text();
    }
    py.FS.writeFile(name, datasetCache[name]);
  }

  async function runCode(){
    const py = await getPython();
    const usesPandas = !!(current && current.needsPandas);

    if(usesPandas && !pandasLoaded){
      showOutput('<span class="dim">Loading pandas… first time only, this can take 10–20 seconds.</span>');
      await py.loadPackage("pandas");
      pandasLoaded = true;
    }
    if(current && current.dataset){
      try{ await ensureDataset(py, current.dataset); }
      catch(e){
        return { ok:false, output:"",
          error:'Could not load the data file "'+current.dataset+'". Make sure it sits in the same folder as index.html.' };
      }
    }

    // stdout capture always; the endless-loop guard only on non-pandas lessons
    py.runPython(PY_STDOUT);
    if(!usesPandas){ py.runPython(PY_GUARD); }

    try{
      if(current && current.setup){
        await py.runPythonAsync(current.setup);
        py.runPython("sys.stdout.seek(0); sys.stdout.truncate(0)"); // discard setup output; grade only the learner's
      }
      await py.runPythonAsync(editor.getValue());
      return { ok:true, output: py.runPython("sys.stdout.getvalue()") };
    }catch(err){
      return { ok:false, output: py.runPython("sys.stdout.getvalue()") || "", error:String(err.message||err) };
    }finally{
      try{ py.runPython("import sys\nsys.settrace(None)"); }catch(e){}
    }
  }

  async function handleRun(){
    setBusy(true,"run"); resultEl.hidden = true;
    try{
      const r = await runCode();
      if(r.ok){
        showOutput(r.output && r.output.trim().length ? escapeHtml(r.output) : '<span class="dim">Code ran — no output to show.</span>');
      }else{
        showOutput(escapeHtml(r.output) + '<span class="err">' + escapeHtml(r.error) + '</span>');
      }
    }catch(e){ showOutput('<span class="err">Could not start Python. Check your connection and refresh.</span>'); }
    finally{ setBusy(false); }
  }

  async function handleCheck(){
    setBusy(true,"check");
    try{
      const r = await runCode();
      if(!r.ok){
        const fe = friendlyError(r.error);
        showOutput((r.output && r.output.length ? escapeHtml(r.output) : '') + '<span class="err">' + escapeHtml(r.error || fe.headline) + '</span>');
        renderResult("error", "Fix the error first", fe.explain, null, false, fe.headline);
        return;
      }
      showOutput(r.output && r.output.trim().length ? escapeHtml(r.output) : '<span class="dim">Code ran — no output to show.</span>');
      if(normalize(r.output) === normalize(current.expected)){
        hintsRevealed = 0;
        setLesson(current.id, { completed:true, code: editor.getValue() });
        markNavDone(current.id); updateOverall(); flashSaved();
        const last = currentIndex === LESSONS.length - 1;
        renderResult("correct", "Correct",
          last ? "Your output matches. That's the last lesson available — more are on the way."
               : "Your output matches. Progress saved.",
          null, !last);
      }else{
        renderResult("notyet", "Not quite yet",
          "Your output doesn't match the target. Compare the two below, then reveal a hint if you need a nudge.",
          { expected: current.expected, got: r.output });
      }
    }catch(e){ renderResult("error","Couldn't run","Python didn't start. Check your connection and refresh."); }
    finally{ setBusy(false); }
  }

  function renderResult(kind, heading, message, cmp, showNext, detail){
    const badge = kind==="correct" ? "PASS" : kind==="notyet" ? "TRY AGAIN" : "ERROR";
    let html = '<div class="head"><span class="badge">'+badge+'</span>'+escapeHtml(heading)+'</div><p>'+escapeHtml(message)+'</p>';
    if(detail){ html += '<pre class="errline">'+escapeHtml(detail)+'</pre>'; }
    if(cmp){
      html += '<div class="cmp">'
        + '<div class="box"><span class="lbl">Target output</span><pre>'+escapeHtml(normalize(cmp.expected))+'</pre></div>'
        + '<div class="box"><span class="lbl">Your output</span><pre>'+(cmp.got && cmp.got.trim().length ? escapeHtml(normalize(cmp.got)) : '(nothing printed)')+'</pre></div>'
        + '</div>';
    }
    if(showNext){ html += '<div class="next"><button class="pill-btn" id="goNext">Next lesson →</button></div>'; }
    const hasHints = kind==="notyet" && current.hints && current.hints.length;
    if(hasHints){ html += '<div class="hints" id="hintsWrap"></div>'; }

    resultEl.className = "result fade " + kind;
    resultEl.innerHTML = html; resultEl.hidden = false; void resultEl.offsetWidth;

    const gn = document.getElementById("goNext");
    if(gn){ gn.addEventListener("click", () => loadLesson(currentIndex + 1)); }
    if(hasHints){ updateHints(); }
  }

  function updateHints(){
    const wrap = document.getElementById("hintsWrap"); if(!wrap) return;
    let h = '<span class="stuck">Need a hint?</span>';
    for(let i=0;i<hintsRevealed;i++){ h += '<div class="hint"><b>Hint '+(i+1)+'</b>'+escapeHtml(current.hints[i])+'</div>'; }
    if(hintsRevealed < current.hints.length){
      const last = hintsRevealed === current.hints.length - 1;
      const label = hintsRevealed === 0 ? "Show a hint" : (last ? "Show the explanation" : "Show next hint");
      h += '<button class="pill-btn" id="hintBtn">'+label+'</button>';
    }else{ h += '<span class="done">That is every hint. Give it another go.</span>'; }
    wrap.innerHTML = h;
    const b = document.getElementById("hintBtn");
    if(b){ b.addEventListener("click", function(){ hintsRevealed = Math.min(hintsRevealed+1, current.hints.length); updateHints(); }); }
  }

  // ----- wire up -----
  document.getElementById("resetBtn").addEventListener("click", function(){
    if(confirm("Reset ALL saved progress and code across every lesson? This cannot be undone.")){
      try{ localStorage.removeItem(STORE_KEY); }catch(e){}
      document.querySelectorAll(".rail-item").forEach(n => n.classList.remove("done"));
      updateOverall(); loadLesson(0);
    }
  });
  document.getElementById("railToggle").addEventListener("click", function(){ document.body.classList.toggle("rail-open"); });
  prevBtn.addEventListener("click", () => loadLesson(currentIndex - 1));
  nextBtn.addEventListener("click", () => loadLesson(currentIndex + 1));
  runBtn.addEventListener("click", handleRun);
  checkBtn.addEventListener("click", handleCheck);
  editor.setOption("extraKeys", { "Ctrl-Enter": handleRun, "Cmd-Enter": handleRun, "Shift-Enter": handleCheck });

  // ----- start -----
  if(LESSONS.length === 0){
    document.getElementById("lessonTitle").textContent = "No lessons loaded";
    document.getElementById("lessonConcept").innerHTML = "<p>lessons.js did not load. Make sure it sits in the same folder as index.html.</p>";
  }else{
    buildSidebar();
    LESSONS.forEach(l => { if(getLesson(l.id).completed) markNavDone(l.id); });
    updateOverall();
    const s = loadStore(); let startIndex = 0;
    if(s.lastLesson){ const idx = LESSONS.findIndex(l => l.id === s.lastLesson); if(idx >= 0) startIndex = idx; }
    loadLesson(startIndex);
  }
</script>
</body>
</html>
